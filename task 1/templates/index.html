<!DOCTYPE html>
<html>
<head>
<title>Email Scraper</title>
</head>

<body>

<h2>Email Scraper</h2>

<form method="POST">
<input type="text" name="url" placeholder="Enter URL" style="width:300px">
<button type="submit">Scrape Emails</button>
</form>

<h3>Results:</h3>

<ul>
{% for email in emails %}
<li>{{email}}</li>
{% endfor %}
</ul>

</body>
</html>
